<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>🏖️ 暑假打卡</title>
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#FF6B35;--primary-dark:#E55A2B;--success:#2ECC71;--danger:#E74C3C;
  --warning:#F39C12;--bg:#FFF8F0;--card-bg:#FFFFFF;--text:#2C3E50;
  --text-light:#7F8C8D;--border:#ECF0F1;--radius:16px;--shadow:0 2px 12px rgba(0,0,0,0.08);
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;
}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}

/* ===== Header ===== */
header{
  background:linear-gradient(135deg,#FF6B35,#FF8C42);color:#fff;padding:12px 20px;
  text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(255,107,53,0.3);
}
header h1{font-size:1.2rem;font-weight:700}

/* ===== Main ===== */
main{flex:1;padding:16px 16px 80px;overflow-y:auto}
.page{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ===== Bottom Nav ===== */
nav.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
  height:64px;background:#fff;display:flex;justify-content:space-around;align-items:center;
  border-top:1px solid var(--border);box-shadow:0 -2px 12px rgba(0,0,0,0.06);z-index:100;
}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;
  color:var(--text-light);font-size:.7rem;padding:6px 12px;border-radius:12px;cursor:pointer;
  border:none;background:none;font-family:inherit;transition:all .2s}
.nav-item .nav-icon{font-size:1.4rem}
.nav-item.active{color:var(--primary);background:#FFF0E8}

/* ===== Cards ===== */
.card{background:#fff;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:16px}
.card h2{font-size:1rem;margin-bottom:8px}
.card h3{font-size:.95rem;margin-bottom:4px}

/* ===== Stats ===== */
.stats{display:flex;justify-content:space-around;background:#fff;border-radius:var(--radius);
  padding:16px 12px;margin-bottom:16px;box-shadow:var(--shadow)}
.stat{display:flex;flex-direction:column;align-items:center;gap:2px}
.stat-icon{font-size:1.6rem}
.stat-val{font-size:1.6rem;font-weight:800;color:var(--primary)}
.stat-lbl{font-size:.7rem;color:var(--text-light)}

/* ===== Progress ===== */
.progress-track{width:100%;height:24px;background:#F0F0F0;border-radius:12px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,#FF6B35,#FFA726);border-radius:12px;
  transition:width .5s;display:flex;align-items:center;justify-content:center;font-size:.75rem;
  font-weight:700;color:#fff;min-width:0}
.progress-fill.complete{background:linear-gradient(90deg,#2ECC71,#27AE60)}

/* ===== Task Items ===== */
.task-item{
  display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;cursor:pointer;
  border:2px solid transparent;margin-bottom:6px;transition:all .2s;background:#FFF8F0;border-color:#FFE0CC;
}
.task-item:active{transform:scale(.98)}
.task-item.done{background:#F0FFF4;border-color:#C6F6D5;opacity:.8}
.task-item .task-emoji{font-size:1.4rem}
.task-item .task-name{flex:1;font-weight:500;font-size:.95rem}
.task-item .task-badge{font-size:1.2rem;flex-shrink:0}

/* ===== Task Detail Card ===== */
.task-detail-card{background:#fff;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);
  border:2px solid transparent;margin-bottom:10px;transition:all .3s}
.task-detail-card.done{border-color:#C6F6D5}
.task-detail-card.expanded{border-color:var(--primary)}
.task-detail-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
.task-detail-header .task-emoji{font-size:2rem}
.task-detail-info{flex:1}
.task-detail-info strong{display:block;font-size:.95rem}
.task-detail-info .status-text{font-size:.75rem;color:var(--text-light)}
.task-detail-body{padding:0 16px 16px;border-top:1px solid var(--border);padding-top:12px;animation:fadeIn .3s}

/* ===== Check Button ===== */
.btn-check{width:36px;height:36px;border-radius:50%;border:3px solid #DDD;background:#fff;
  font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;flex-shrink:0}
.btn-check.checked{background:var(--success);border-color:var(--success);color:#fff}

/* ===== Buttons ===== */
.btn{
  display:inline-block;padding:10px 20px;border:none;border-radius:10px;font-size:.9rem;
  font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s
}
.btn:active{transform:scale(.97)}
.btn-primary{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#FF6B35,#FF8C42);
  color:#fff;font-size:1rem;font-weight:700}
.btn-sm{padding:8px 16px;background:#F0F0F0;color:var(--text);font-size:.8rem}
.btn-sm:active{background:#E0E0E0}
.btn-danger{display:block;width:100%;padding:14px;background:#fff;color:var(--danger);
  border:2px solid var(--danger);font-size:.95rem}
.btn-coupon{padding:6px 12px;background:#FFF3CD;border:1px solid #FFEEBA;border-radius:8px;
  font-size:.8rem;cursor:pointer;color:#856404}

/* ===== Date Picker ===== */
.date-picker{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.date-picker button{width:40px;height:40px;background:#fff;border:2px solid var(--border);
  border-radius:50%;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.date-picker button:active{background:#F0F0F0}
.date-display{text-align:center}
.date-display span{display:block;font-size:1.1rem;font-weight:700}
.date-display .badge{display:inline-block;padding:2px 10px;border-radius:8px;font-size:.7rem;margin:2px 0}
.badge-travel{background:#BEE3F8;color:#2C5282}
.badge-today{background:#FFE0CC;color:var(--primary)}

/* ===== Upload ===== */
.upload-label{display:inline-block;padding:10px 20px;background:#F0F8FF;border:2px dashed #BEE3F8;
  border-radius:10px;cursor:pointer;font-size:.9rem;transition:all .2s;margin-bottom:8px}
.upload-label:active{background:#E0F0FF}
.upload-hint{display:block;font-size:.7rem;color:var(--text-light);margin:4px 0 8px}
.files-preview{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.file-thumb{position:relative;width:80px;height:80px;border-radius:8px;overflow:hidden;
  background:#F5F5F5;border:1px solid var(--border)}
.file-thumb img{width:100%;height:100%;object-fit:cover;cursor:pointer}
.file-thumb .file-name{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.6);
  color:#fff;font-size:.55rem;padding:2px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-del-file{position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;
  background:var(--danger);color:#fff;border:none;font-size:.6rem;cursor:pointer}
.note-section{margin-bottom:8px}
.note-section textarea{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;
  font-family:inherit;font-size:.85rem;resize:vertical;margin-bottom:6px}
.note-section textarea:focus{outline:none;border-color:var(--primary)}
.coupon-section{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:.85rem;
  margin-top:8px;padding-top:8px;border-top:1px dashed var(--border)}
.mini-progress{display:flex;align-items:center;gap:12px;font-size:.85rem;font-weight:600;margin:8px 0 16px}
.mini-progress .bar{flex:1;height:10px;background:#F0F0F0;border-radius:5px;overflow:hidden}
.mini-progress .bar .fill{border-radius:5px;height:100%;background:linear-gradient(90deg,#FF6B35,#FFA726)}

/* ===== Calendar ===== */
.month-picker{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.month-picker h2{font-size:1.1rem}
.cal-stats{display:flex;justify-content:center;gap:16px;margin-bottom:16px;font-size:.8rem;
  color:var(--text-light);flex-wrap:wrap}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
.cal-hdr{text-align:center;font-size:.75rem;font-weight:700;color:var(--text-light);padding:8px 0}
.cal-cell{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;cursor:pointer;transition:all .2s;font-size:.8rem;position:relative;min-height:44px}
.cal-cell:active{transform:scale(.92)}
.cal-cell .day-num{font-weight:600;font-size:.85rem}
.cal-cell .day-icon{font-size:.7rem}
.cal-cell .day-prog{font-size:.55rem;color:var(--text-light)}
.cell-full{background:#D4EDDA;border:2px solid #2ECC71}
.cell-part{background:#FFF3CD;border:2px solid #F39C12}
.cell-none{background:#F8F9FA;border:2px solid #ECF0F1}
.cell-travel{background:#D6EAF8;border:2px solid #3498DB}
.is-today{box-shadow:0 0 0 3px var(--primary);z-index:1}
.cell-oor{opacity:.35;cursor:not-allowed}
.cal-legend{display:flex;flex-wrap:wrap;gap:8px;font-size:.75rem;color:var(--text-light);align-items:center}
.legend-dot{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:4px}
.legend-dot.green{background:#D4EDDA;border:1px solid #2ECC71}
.legend-dot.yellow{background:#FFF3CD;border:1px solid #F39C12}
.legend-dot.gray{background:#F8F9FA;border:1px solid #ECF0F1}
.legend-dot.blue{background:#D6EAF8;border:1px solid #3498DB}
.legend-hint{width:100%;font-size:.7rem;margin-top:2px}

/* ===== Lottery ===== */
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tabs button{flex:1;padding:10px;background:#fff;border:2px solid var(--border);
  border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer}
.tabs button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.wheel-wrap{display:flex;justify-content:center;margin:16px 0}
.wheel-actions{text-align:center;margin:16px 0}
.btn-spin{padding:16px 48px;background:linear-gradient(135deg,#FF6B35,#E55A2B);color:#fff;
  border:none;border-radius:50px;font-size:1.2rem;font-weight:800;cursor:pointer;
  box-shadow:0 4px 16px rgba(255,107,53,0.4);animation:pulse 2s infinite}
.btn-spin:active{transform:scale(.95)}
@keyframes pulse{0%,100%{box-shadow:0 4px 16px rgba(255,107,53,0.4)}50%{box-shadow:0 4px 32px rgba(255,107,53,0.7)}}
.cannot-spin{color:var(--text-light);font-size:.9rem;padding:12px;background:#F8F9FA;border-radius:10px}
.spin-result{text-align:center;background:#fff;border-radius:var(--radius);padding:24px;
  box-shadow:var(--shadow);animation:popIn .5s}
@keyframes popIn{0%{transform:scale(.5);opacity:0}80%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
.result-icon{font-size:4rem;animation:bounce .4s infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-12px)}}
.result-name{font-size:1.5rem;font-weight:800;margin:12px 0 8px;color:var(--primary)}
.result-hint{color:var(--text-light);font-size:.9rem;margin-bottom:16px}
.prize-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.prize-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fff;
  border-radius:8px;font-size:.85rem}
.prize-item .prob{margin-left:auto;font-weight:600;color:var(--primary)}
.history-item{display:flex;align-items:center;gap:12px;background:#fff;padding:12px 14px;
  border-radius:12px;box-shadow:var(--shadow);margin-bottom:8px}
.history-item .h-icon{font-size:1.8rem}
.history-item .h-info{flex:1}
.history-item .h-info strong{display:block;font-size:.9rem}
.history-item .h-date{font-size:.75rem;color:var(--text-light)}

/* ===== Settings ===== */
.settings-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#F8F9FA;
  border-radius:10px;font-size:.9rem;margin-bottom:6px}
.btn-toggle{margin-left:auto;padding:4px 14px;border-radius:20px;border:none;font-size:.75rem;
  font-weight:600;cursor:pointer}
.btn-toggle.on{background:#D4EDDA;color:#155724}
.btn-toggle.off{background:#F8D7DA;color:#721C24}
.input-group{margin-bottom:12px}
.input-group label{display:block;font-size:.85rem;font-weight:600;margin-bottom:4px}
.input-group input,.input-group textarea{width:100%;padding:10px 14px;border:2px solid var(--border);
  border-radius:10px;font-size:.95rem;font-family:inherit}
.input-group input:focus,.input-group textarea:focus{outline:none;border-color:var(--primary)}

/* ===== Messages ===== */
.msg{position:fixed;top:70px;left:50%;transform:translateX(-50%);padding:10px 20px;
  border-radius:20px;font-size:.85rem;z-index:200;animation:fadeIn .3s;pointer-events:none}
.msg-err{background:#FDE8E8;color:var(--danger)}
.msg-ok{background:#D4EDDA;color:#155724}

/* ===== Coupons & Teaser ===== */
.coupons-card{margin-bottom:16px}
.coupons-card h3{font-size:.95rem;margin-bottom:10px}
.coupon-item{display:flex;align-items:center;gap:8px;background:#FFF8E1;padding:10px;
  border-radius:10px;font-size:.9rem;margin-bottom:6px}
.coupon-item .c-date{margin-left:auto;font-size:.75rem;color:var(--text-light)}
.lottery-teaser{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,#FFF3CD,#FFEAA7);
  border-radius:var(--radius);padding:16px;cursor:pointer;margin-bottom:16px;border:2px solid #F39C12}
.lottery-teaser:active{transform:scale(.98)}
.teaser-icon{font-size:2.5rem}
.lottery-teaser strong{display:block;color:#856404}
.lottery-teaser p{font-size:.85rem;color:#B7950B}

/* ===== All done ===== */
.all-done{text-align:center;padding:24px;background:#fff;border-radius:var(--radius);
  box-shadow:var(--shadow);margin-top:16px}
.all-done .icon{font-size:4rem;animation:bounce .6s infinite alternate}
.all-done p{font-size:1.2rem;font-weight:700;margin:8px 0 16px}

/* ===== Responsive ===== */
@media(min-width:768px){#app{max-width:768px}nav.bottom-nav{max-width:768px}}
@media(min-width:1024px){#app{max-width:1024px}nav.bottom-nav{max-width:1024px}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#DDD;border-radius:4px}
.empty-msg{text-align:center;color:var(--text-light);padding:32px 16px}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ===== DATABASE LAYER =====
const DB_NAME = 'SummerCheckinDB';
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('photos')) {
        d.createObjectStore('photos', { keyPath: 'id', autoIncrement: true });
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = () => reject(req.error);
  });
}

function savePhoto(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const tx = db.transaction('photos', 'readwrite');
      const store = tx.objectStore('photos');
      const req = store.add({
        filename: file.name,
        mime: file.type,
        size: file.size,
        data: reader.result,
        date: new Date().toISOString().slice(0, 10),
        created: Date.now()
      });
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    };
    reader.readAsDataURL(file);
  });
}

function getPhoto(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('photos', 'readonly');
    const req = tx.objectStore('photos').get(id);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function deletePhoto(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('photos', 'readwrite');
    const req = tx.objectStore('photos').delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

// ===== STORAGE HELPERS =====
const LS = {
  get(k, def) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } },
  set(k, v) { localStorage.setItem(k, JSON.stringify(v)); },
};

const DEFAULT_TASKS = [
  { id: 1, name: '语文练字', icon: '📝', active: true, points: 5 },
  { id: 2, name: '阅读打卡', icon: '📖', active: true, points: 5 },
  { id: 3, name: '背诵打卡', icon: '🗣️', active: true, points: 6 },
  { id: 4, name: '数学练习', icon: '🧮', active: true, points: 5 },
  { id: 5, name: '英语背诵', icon: '🔤', active: true, points: 6 },
  { id: 6, name: '体能训练', icon: '🏃', active: true, points: 8 },
  { id: 7, name: '刷碗', icon: '🧹', active: true, points: 5 },
  { id: 8, name: '家务', icon: '🧹', active: true, points: 5 },
  { id: 9, name: '英孚英语打卡', icon: '📝', active: true, points: 6 },
];

const DEFAULT_PRIZES = [
  { id: 1, name: '大餐', icon: '🍕', prob: 0.03 },
  { id: 2, name: '玩具', icon: '🎁', prob: 0.05 },
  { id: 3, name: '礼物-验卡', icon: '🎀', prob: 0.08 },
  { id: 4, name: '免练字一次', icon: '🎫', prob: 0.10 },
  { id: 5, name: '免体能一次', icon: '🏅', prob: 0.10 },
  { id: 6, name: '积分+10', icon: '⭐', prob: 0.25 },
  { id: 7, name: '积分+5', icon: '🌟', prob: 0.24 },
  { id: 8, name: '听故事书1小时', icon: '🎧', prob: 0.10 },
  { id: 9, name: '看视频20分钟', icon: '📱', prob: 0.05 },
];

function getTasks() { return LS.get('tasks', DEFAULT_TASKS); }
function getActiveTasks() { return getTasks().filter(t => t.active); }
function getPrizes() { return LS.get('prizes', DEFAULT_PRIZES); }
function getCheckins() { return LS.get('checkins', {}); }
function getTravelDays() { return LS.get('travel_days', []); }
function getLotteryHistory() { return LS.get('lottery_history', []); }
function getCoupons() { return LS.get('coupons', []); }
function getUnlocks() { return LS.get('unlocks', []); }
function getDailyThreshold() { return LS.get('dailyThreshold', 30); }

// Calculate earned points and spin deductions for a date
function getBonusPoints() { return LS.get('bonus_points', {}); }
function setBonusPoints(v) { LS.set('bonus_points', v); }

function getDayPoints(dateStr) {
  const checkins = getCheckins();
  const tasks = getActiveTasks();
  let earned = 0;
  tasks.forEach(t => {
    const key = dateStr+'_'+t.id;
    if (checkins[key]?.status === 'done') earned += (t.points || 0);
  });
  const unlocks = getUnlocks();
  const dayUnlocks = unlocks.filter(u => u.date === dateStr).length;
  const threshold = getDailyThreshold();
  const spent = dayUnlocks * threshold;
  const bonus = getBonusPoints()[dateStr] || 0;
  return { earned, spent, bonus, available: Math.max(0, earned - spent + bonus) };
}

// Pooled available for lottery: today + past 3 days' earned + bonus - today's spins
function getAvailableForLottery() {
  let totalEarned = 0, totalBonus = 0;
  const range = allowedDateRange();
  let d = new Date(range.min + 'T00:00:00');
  const end = new Date(range.max + 'T00:00:00');
  while (d <= end) {
    const ds = d.toISOString().slice(0, 10);
    totalEarned += getDayPoints(ds).earned;
    totalBonus += getBonusPoints()[ds] || 0;
    d.setDate(d.getDate() + 1);
  }
  const todaySpins = getUnlocks().filter(u => u.date === today()).length;
  const spent = todaySpins * getDailyThreshold();
  return Math.max(0, totalEarned + totalBonus - spent);
}

function setCheckins(v) { LS.set('checkins', v); }
function setTravelDays(v) { LS.set('travel_days', v); }
function setLotteryHistory(v) { LS.set('lottery_history', v); }
function setCoupons(v) { LS.set('coupons', v); }
function setUnlocks(v) { LS.set('unlocks', v); }
function setTasks(v) { LS.set('tasks', v); }

function today() { return new Date().toISOString().slice(0, 10); }

// ===== APP STATE =====
let currentView = 'home';
let currentDate = today();
let expandedTask = null;

// ===== RENDER =====
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);
const app = $('#app');

function showMsg(text, type) {
  const existing = $('.msg');
  if (existing) existing.remove();
  const div = document.createElement('div');
  div.className = `msg msg-${type}`;
  div.textContent = text;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 2500);
}

function render() {
  const activeTasks = getActiveTasks();
  const checkins = getCheckins();
  const travelDays = getTravelDays();
  const coupons = getCoupons();
  const prizes = getPrizes();
  const history = getLotteryHistory();

  const threshold = getDailyThreshold();
  const todayPts = getDayPoints(currentDate);
  const pooledPts = getAvailableForLottery();
  const canLottery = pooledPts >= threshold;
  const todaySpins = getUnlocks().filter(u => u.date === today()).length;

  // Streak calc (at least threshold points earned per day)
  let streak = 0;
  const d = new Date();
  d.setDate(d.getDate() + 1);
  while (true) {
    d.setDate(d.getDate() - 1);
    const ds = d.toISOString().slice(0, 10);
    const dp = getDayPoints(ds);
    if (dp.earned < threshold) break;
    streak++;
  }

  // Monthly stats
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth() + 1;
  const prefix = `${y}-${String(m).padStart(2,'0')}`;
  let monthFull = 0;
  const daysInMonth = new Date(y, m, 0).getDate();
  for (let day = 1; day <= daysInMonth; day++) {
    const ds = `${prefix}-${String(day).padStart(2,'0')}`;
    const dp = getDayPoints(ds);
    if (dp.earned >= threshold) monthFull++;
  }

  let html = '';
  const saveTime = lastSaveTime();
  html += '<header><h1>🏖️ 暑假打卡</h1>'+(saveTime?'<span style="font-size:.6rem;opacity:.8">💾 '+saveTime+'</span>':'')+'</header><main>';

  if (currentView === 'home') {
    // Stats
    html += `<div class="stats">
      <div class="stat"><span class="stat-icon">🔥</span><span class="stat-val">${streak}</span><span class="stat-lbl">连续打卡</span></div>
      <div class="stat"><span class="stat-icon">🎫</span><span class="stat-val">${coupons.filter(c=>!c.used).length}</span><span class="stat-lbl">免做券</span></div>
      <div class="stat"><span class="stat-icon">⭐</span><span class="stat-val">${pooledPts}</span><span class="stat-lbl">今日积分</span></div>
    </div>`;

    // Today card
    const maxPts = activeTasks.reduce((s,t) => s + (t.points||0), 0);
    const pctW = maxPts > 0 ? Math.min(100, (pooledPts / threshold) * 100) : 0;
    const totalTasks = activeTasks.length;
    let doneCount = 0;
    activeTasks.forEach(t => { if (checkins[currentDate+'_'+t.id]?.status === 'done') doneCount++; });
    html += `<div class="card">
      <h2>📅 ${currentDate} ${travelDays.includes(currentDate) ? '✈️ 旅行模式' : ''}</h2>
      <div class="progress-track"><div class="progress-fill${canLottery?' complete':''}" style="width:${pctW}%">${canLottery?'🎰 可抽奖！('+pooledPts+'分)':pooledPts+'/'+threshold+'分'}</div></div>
      <p style="font-size:.7rem;color:var(--text-light);margin:4px 0 8px">${doneCount}/${totalTasks}项 · 总积分上限${maxPts} · 抽奖消耗${threshold}分${todaySpins>0?' · 今日已抽'+todaySpins+'次':''}</p>`;
    activeTasks.forEach(t => {
      const key = `${currentDate}_${t.id}`;
      const done = checkins[key]?.status === 'done';
      html += `<div class="task-item${done?' done':''}" onclick="quickToggle(${t.id})">
        <span class="task-emoji">${t.icon}</span><span class="task-name">${t.name}</span>
        <span style="font-size:.7rem;color:var(--text-light);margin-right:4px">+${t.points||0}</span>
        ${done?'<span class="task-badge">✅</span>':''}
      </div>`;
    });
    html += `<button class="btn btn-primary" onclick="navTo('daily')" style="margin-top:12px">📸 详细打卡（上传照片）</button></div>`;

    // Lottery teaser
    if (canLottery) {
      html += `<div class="lottery-teaser" onclick="navTo('lottery')">
        <span class="teaser-icon">🎰</span><div><strong>积分达标！去抽奖！</strong><p>${pooledPts}分可用 · 消耗${threshold}分抽一次</p></div></div>`;
    }

    // Coupons
    const activeCoupons = coupons.filter(c => !c.used);
    if (activeCoupons.length > 0) {
      html += `<div class="card coupons-card"><h3>🎫 可用免做券</h3>`;
      activeCoupons.forEach(c => {
        html += `<div class="coupon-item"><span>🎫</span><span>${c.taskName}</span><span class="c-date">获得于 ${c.wonDate}</span></div>`;
      });
      html += `<p style="font-size:.75rem;color:var(--text-light);margin-top:8px">在打卡页面使用免做券</p></div>`;
    }
  }

  else if (currentView === 'daily') {
    // Date picker
    const range = allowedDateRange();
    const canGoBack = currentDate > range.min;
    const canGoFwd = currentDate < range.max;
    html += `<div class="date-picker">
      <button onclick="changeDate(-1)"${canGoBack?'':' disabled style="opacity:0.3;cursor:not-allowed"'} title="${canGoBack?'向前翻':'已到最早补卡日期'}">◀</button>
      <div class="date-display"><span>${currentDate}</span>${travelDays.includes(currentDate)?'<span class="badge badge-travel">✈️ 旅行模式</span>':''}${currentDate===today()?'<span class="badge badge-today">今天</span>':''}<small style="display:block;font-size:.65rem;color:var(--text-light);margin-top:2px">仅可打卡今天及过去3天</small></div>
      <button onclick="changeDate(1)"${canGoFwd?'':' disabled style="opacity:0.3;cursor:not-allowed"'} title="${canGoFwd?'向后翻':'今天是最新的日期'}">▶</button></div>`;

    const dpDaily = getDayPoints(currentDate);
    const isToday = currentDate === today();
    const poolAvail2 = isToday ? getAvailableForLottery() : dpDaily.available;
    html += `<div class="mini-progress"><span>⭐ ${dpDaily.available}分</span>
      <div class="bar"><div class="fill" style="width:${Math.min(100,(poolAvail2/threshold)*100)}%"></div></div>
      <span>${poolAvail2 >= threshold ? '🎰 可抽奖' : '还需'+(threshold-poolAvail2)+'分'}</span>
      ${isToday && dpDaily.available !== poolAvail2 ? '<small style="font-size:.65rem;color:var(--text-light)">（含补卡积分）</small>' : ''}
      </div>`;

    activeTasks.forEach(t => {
      const key = `${currentDate}_${t.id}`;
      const cin = checkins[key] || { status: 'pending', note: '', photos: [] };
      const done = cin.status === 'done';
      const isExp = expandedTask === t.id;
      const matchingCoupons = coupons.filter(c => !c.used && c.taskName === t.name);

      html += `<div class="task-detail-card${done?' done':''}${isExp?' expanded':''}">
        <div class="task-detail-header" onclick="toggleExpand(${t.id})">
          <span class="task-emoji">${t.icon}</span>
          <div class="task-detail-info"><strong>${t.name} <span style="font-size:.7rem;color:var(--primary)">+${t.points||0}分</span></strong><span class="status-text">${done?'✅ 已完成':(travelDays.includes(currentDate)?'✈️ 旅行中':'⏳ 未完成')}${cin.photos.length ? ' · 📸 '+cin.photos.length+'张':''}</span></div>
          <button class="btn-check${done?' checked':''}" onclick="event.stopPropagation();toggleTask(${t.id})">${done?'✅':'○'}</button>
        </div>`;

      if (isExp) {
        html += `<div class="task-detail-body">
          <label class="upload-label" for="file_${t.id}">📸 拍照/上传 <input type="file" id="file_${t.id}" accept="image/*,.pdf" multiple style="display:none" onchange="handleUpload(${t.id},this)"></label>
          <span class="upload-hint">支持图片、PDF</span>`;

        // Photos
        if (cin.photos.length > 0) {
          html += `<div class="files-preview">`;
          cin.photos.forEach(pid => {
            html += `<div class="file-thumb" id="thumb_${pid}"><div class="file-name">加载中...</div></div>`;
          });
          html += `</div>`;
        }

        // Note
        html += `<div class="note-section">
          <textarea placeholder="文字说明（可选）..." id="note_${t.id}" rows="2">${cin.note||''}</textarea>
          <button class="btn btn-sm" onclick="saveNote(${t.id})">💾 保存备注</button></div>`;

        // Coupon
        if (matchingCoupons.length > 0 && !done) {
          html += `<div class="coupon-section"><span>🎫 可用免做券：</span>`;
          matchingCoupons.forEach(c => {
            html += '<button class="btn-coupon" onclick="useCoupon('+c.id+",'"+t.name.replace(/'/g,"\\'")+"')\">使用（来自"+c.wonDate+"）</button>";
          });
          html += `</div>`;
        }
        html += `</div>`;
      }
      html += `</div>`;
    });

    const poolAvail = getAvailableForLottery();
    if (poolAvail >= threshold && currentDate === today()) {
      html += `<div class="all-done"><div class="icon">🎰</div><p>积分达标 (${poolAvail}/${threshold})！</p>
        <button class="btn btn-primary" onclick="navTo('lottery')">🎰 去抽奖（消耗${threshold}分）</button></div>`;
    }
  }

  else if (currentView === 'calendar') {
    const calYear = LS.get('cal_year', new Date().getFullYear());
    const calMonth = LS.get('cal_month', new Date().getMonth() + 1);
    const prefix2 = `${calYear}-${String(calMonth).padStart(2,'0')}`;
    const daysInM = new Date(calYear, calMonth, 0).getDate();
    const firstDow = new Date(calYear, calMonth - 1, 1).getDay();

    let calFull = 0, calTravel = 0;
    for (let day = 1; day <= daysInM; day++) {
      const ds = `${prefix2}-${String(day).padStart(2,'0')}`;
      if (travelDays.includes(ds)) calTravel++;
      else {
        const dpC = getDayPoints(ds);
        if (dpC.earned >= threshold) calFull++;
      }
    }

    html += `<div class="month-picker"><button onclick="changeCalMonth(-1)">◀</button>
      <h2>${calYear}年${calMonth}月</h2><button onclick="changeCalMonth(1)">▶</button></div>`;
    html += `<div class="cal-stats"><span>🌟 全勤 ${calFull}天</span><span>✈️ 旅行 ${calTravel}天</span><span>🔥 连续 ${streak}天</span></div>`;
    html += `<div class="cal-grid">${['日','一','二','三','四','五','六'].map(d=>`<div class="cal-hdr">${d}</div>`).join('')}`;

    for (let i = 0; i < firstDow; i++) html += `<div class="cal-cell" style="cursor:default"></div>`;
    for (let day = 1; day <= daysInM; day++) {
      const ds = `${prefix2}-${String(day).padStart(2,'0')}`;
      const isTD = travelDays.includes(ds);
      let cellClass = 'cell-none', icon = '', prog = '';
      if (isTD) { cellClass = 'cell-travel'; icon = '✈️'; }
      else {
        const dp3 = getDayPoints(ds);
        const max3 = getActiveTasks().reduce((s,t)=>s+(t.points||0),0);
        if (dp3.earned >= max3) { cellClass = 'cell-full'; icon = '🌟'; prog = dp3.earned+''; }
        else if (dp3.earned > 0) { cellClass = 'cell-part'; icon = '🔸'; prog = dp3.earned+'/'+max3; }
        else prog = '0/'+max3;
      }
      const isToday = ds === today();
      const inRange = isDateAllowed(ds);
      const clickAction = inRange ? "openDate('"+ds+"')" : "void(0)";
      html += '<div class="cal-cell '+cellClass+(isToday?' is-today':'')+(!inRange?' cell-oor':'')+'" onclick="'+clickAction+'" oncontextmenu="event.preventDefault();toggleTravelDay(\''+ds+'\')">'+
        '<span class="day-num">'+day+'</span><span class="day-icon">'+icon+'</span><span class="day-prog">'+prog+'</span></div>';
    }
    html += `</div>`;
    html += `<div class="cal-legend">
      <div><span class="legend-dot green"></span>全部完成</div><div><span class="legend-dot yellow"></span>部分完成</div>
      <div><span class="legend-dot gray"></span>未打卡</div><div><span class="legend-dot blue"></span>旅行模式</div>
      <div class="legend-hint">💡 右键日期切换旅行模式 | 👆 点击日期查看详情</div></div>`;
  }

  else if (currentView === 'lottery') {
    const tab = LS.get('lottery_tab', 'wheel');
    html += `<div class="tabs">
      <button class="${tab==='wheel'?'active':''}" onclick="setLotteryTab('wheel')">🎰 转轮盘</button>
      <button class="${tab==='history'?'active':''}" onclick="setLotteryTab('history')">📋 抽奖记录</button></div>`;

    if (tab === 'wheel') {
      const canSpinNow = pooledPts >= threshold;
      const bp = todayPts.bonus || 0;
      html += '<div class="card" style="text-align:center;margin-bottom:8px"><div style="display:flex;justify-content:space-around">'+
        '<div><span style="font-size:1.5rem;font-weight:800;color:var(--primary)">'+pooledPts+'</span><br><span style="font-size:.7rem;color:var(--text-light)">可用积分</span></div>'+
        '<div><span style="font-size:1rem">🎯</span><br><span style="font-size:.7rem;color:var(--text-light)">门槛 '+threshold+'</span></div>'+
        '<div><span style="font-size:1rem">'+(todayPts.earned||0)+'</span><br><span style="font-size:.7rem;color:var(--text-light)">任务积分</span></div>'+
        (bp>0?'<div><span style="font-size:1rem;color:var(--success)">+'+bp+'</span><br><span style="font-size:.7rem;color:var(--text-light)">抽奖积分</span></div>':'')+
        '<div><span style="font-size:1rem">🎰×'+(todaySpins||0)+'</span><br><span style="font-size:.7rem;color:var(--text-light)">已抽次数</span></div>'+
        '</div></div>';
      html += '<div class="wheel-wrap"><canvas id="wheelCanvas" width="320" height="320"></canvas></div>'+
        '<div class="wheel-actions">'+
          (canSpinNow
            ? '<button class="btn-spin" onclick="spin()">🎰 开始抽奖！（消耗'+threshold+'分）</button>'
            : '<div class="cannot-spin">当前'+pooledPts+'分，需'+threshold+'分才能抽奖'+(todaySpins>0?'（今日已抽'+todaySpins+'次）':'')+'</div>')+
        '</div><div id="spinResult"></div>';
      html += `<div class="card"><h3>奖品列表</h3><div class="prize-list">`;
      prizes.forEach(p => {
        html += `<div class="prize-item"><span>${p.icon}</span><span>${p.name}</span><span class="prob">${Math.round(p.prob*100)}%</span></div>`;
      });
      html += `</div></div>`;
    } else {
      if (history.length === 0) {
        html += `<div class="empty-msg">还没有抽奖记录，快去完成打卡抽奖吧！</div>`;
      } else {
        history.slice().reverse().forEach(h => {
          const isBig = ['大餐','玩具','礼物'].includes(h.name);
          let actionHtml = '<span style="color:var(--text-light);font-size:.75rem">自动生效</span>';
          if (isBig) {
            actionHtml = h.redeemed
              ? '<span style="color:var(--success);font-size:.75rem">✅ 已兑换</span>'
              : '<button class="btn btn-sm" style="background:#FFF3CD;color:#856404" onclick="redeemPrize('+h.id+')">🎁 已兑换</button>';
          }
          html += '<div class="history-item"><span class="h-icon">'+h.icon+'</span><div class="h-info"><strong>'+h.name+'</strong><span class="h-date">'+h.date+'</span></div>'+actionHtml+'</div>';
        });
      }
    }
  }

  else if (currentView === 'settings') {
    // Task management
    html += '<div class="card"><h3>📋 打卡任务</h3><p style="font-size:.75rem;color:var(--text-light);margin-bottom:12px">编辑名称、积分、启用/停用</p>';
    const allTasks = getTasks();
    allTasks.forEach(t => {
      html += '<div class="settings-item" style="gap:4px;flex-wrap:wrap">'+
        '<span class="editable-icon" id="icon_'+t.id+'" onclick="cycleIcon('+t.id+')" title="点击切换图标">'+t.icon+'</span>'+
        '<input value="'+t.name.replace(/"/g,'&quot;')+'" id="name_'+t.id+'" style="flex:1;min-width:60px;border:1px solid var(--border);border-radius:6px;padding:4px 6px;font-size:.8rem;font-family:inherit" onchange="renameTask('+t.id+',this.value)">'+
        '<input type="number" value="'+(t.points||0)+'" id="pts_'+t.id+'" min="0" max="100" style="width:42px;border:1px solid var(--border);border-radius:6px;padding:4px;font-size:.8rem;text-align:center;font-family:inherit" onchange="updateTaskPoints('+t.id+',this.value)" title="积分">'+
        '<span style="font-size:.65rem">分</span>'+
        '<button class="btn-toggle '+(t.active?'on':'off')+'" onclick="toggleTaskActive('+t.id+')">'+(t.active?'启用':'停用')+'</button>'+
        '<button style="background:none;border:none;cursor:pointer;font-size:1rem;padding:2px 4px" onclick="deleteTask('+t.id+')" title="删除">🗑️</button>'+
        '</div>';
    });
    // Add new task form
    html += '<div class="settings-item" style="gap:4px;margin-top:10px;background:#FFF8F0;border:2px dashed #FFE0CC">'+
      '<span id="newIcon" style="font-size:1.4rem;cursor:pointer" onclick="cycleNewIcon()">📝</span>'+
      '<input id="newName" placeholder="新任务" style="flex:1;min-width:60px;border:1px solid var(--border);border-radius:6px;padding:6px;font-size:.85rem;font-family:inherit" onkeydown="if(event.key==\'Enter\')addTask()">'+
      '<input type="number" id="newPoints" value="10" min="1" max="100" style="width:42px;border:1px solid var(--border);border-radius:6px;padding:6px;font-size:.85rem;text-align:center;font-family:inherit">'+
      '<span style="font-size:.65rem">分</span>'+
      '<button class="btn btn-sm" onclick="addTask()" style="background:var(--primary);color:#fff">➕</button>'+
      '</div></div>';

    // Points settings
    html += '<div class="card"><h3>⭐ 积分规则</h3>';
    html += '<div class="settings-item"><span>🎯 抽奖门槛</span><input type="number" id="thresholdSet" value="'+getDailyThreshold()+'" min="1" max="500" style="margin-left:auto;width:60px;border:1px solid var(--border);border-radius:6px;padding:4px;font-size:.85rem;text-align:center;font-family:inherit" onchange="setThreshold(this.value)"><span style="font-size:.75rem">分</span></div>';
    html += '<p style="font-size:.7rem;color:var(--text-light);margin-top:4px">积分 ≥ 门槛 → 解锁抽奖。抽一次扣掉门槛分，继续攒够可以再抽。</p>';
    html += '</div>';

    html += `<div class="card"><h3>🎁 奖品配置</h3><p style="font-size:.75rem;color:var(--text-light);margin-bottom:4px">编辑奖品名称、图标和概率</p>`;
    const totalProb = prizes.reduce((s,p)=>s+p.prob,0);
    html += `<p style="font-size:.75rem;margin-bottom:12px;color:${Math.abs(totalProb-1)<0.001?'var(--success)':'var(--danger)'}">概率合计：${Math.round(totalProb*100)}%${Math.abs(totalProb-1)<0.001?' ✅':' ⚠️（应等于100%）'}</p>`;
    prizes.forEach(p => {
      html += `<div class="settings-item" style="gap:6px;flex-wrap:wrap">
        <span class="editable-icon" onclick="cyclePrizeIcon(${p.id})" title="点击切换图标">${p.icon}</span>
        <input value="${p.name.replace(/"/g,'&quot;')}" id="pname_${p.id}" style="flex:1;min-width:60px;border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:.85rem;font-family:inherit" onchange="renamePrize(${p.id},this.value)">
        <input type="number" value="${Math.round(p.prob*100)}" id="pprob_${p.id}" min="1" max="99" style="width:52px;border:1px solid var(--border);border-radius:6px;padding:4px;font-size:.85rem;text-align:center;font-family:inherit" onchange="updatePrizeProb(${p.id},this.value)"><span style="font-size:.75rem">%</span>
        <button style="background:none;border:none;cursor:pointer;font-size:1rem;padding:2px 6px" onclick="deletePrize(${p.id})" title="删除">🗑️</button>
      </div>`;
    });
    // Add new prize
    html += `<div class="settings-item" style="gap:6px;margin-top:10px;background:#FFF8F0;border:2px dashed #FFE0CC">
      <span id="newPrizeIcon" style="font-size:1.4rem;cursor:pointer" onclick="cycleNewPrizeIcon()">🎁</span>
      <input id="newPrizeName" placeholder="奖品名称" style="flex:1;min-width:60px;border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:.85rem;font-family:inherit" onkeydown="if(event.key==='Enter')addPrize()">
      <input type="number" id="newPrizeProb" value="10" min="1" max="99" style="width:52px;border:1px solid var(--border);border-radius:6px;padding:6px;font-size:.85rem;text-align:center;font-family:inherit"><span style="font-size:.75rem">%</span>
      <button class="btn btn-sm" onclick="addPrize()" style="background:var(--primary);color:#fff">➕</button>
    </div></div>`;

    const tdList = getTravelDays();
    html += `<div class="card"><h3>✈️ 旅行日期</h3>`;
    if (tdList.length) {
      tdList.forEach(td => {
        html += `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0"><span>✈️ ${td}</span><button class="btn btn-sm" onclick="toggleTravelDay('${td}')">取消</button></div>`;
      });
    } else {
      html += `<p class="empty-msg">暂无旅行计划<br><small>在日历页面右键日期来设置</small></p>`;
    }
    html += `</div>`;

    html += `<div class="card"><h3>💾 数据管理</h3>
      <button class="btn btn-sm" onclick="exportData()" style="margin:4px">📤 导出全部数据</button>
      <button class="btn btn-sm" onclick="document.getElementById('importFile').click()" style="margin:4px">📥 导入数据</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)">
      <button class="btn btn-danger" onclick="resetData()" style="margin-top:8px">🔄 重置所有数据</button>
      </div>`;
  }

  html += `</main>`;

  // Bottom nav
  const views = [
    { id: 'home', label: '首页', icon: '🏠' },
    { id: 'daily', label: '打卡', icon: '✅' },
    { id: 'calendar', label: '日历', icon: '📅' },
    { id: 'lottery', label: '抽奖', icon: '🎰' },
    { id: 'settings', label: '设置', icon: '⚙️' },
  ];
  html += `<nav class="bottom-nav">`;
  views.forEach(v => {
    html += `<button class="nav-item${currentView===v.id?' active':''}" onclick="navTo('${v.id}')"><span class="nav-icon">${v.icon}</span><span>${v.label}</span></button>`;
  });
  html += `</nav>`;

  app.innerHTML = html;

  // Defer: render wheel canvas + load photo thumbs
  if (currentView === 'lottery' && LS.get('lottery_tab','wheel')==='wheel') {

// ===== WHEEL CANVAS =====
const WHEEL_COLORS = ['#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD','#98D8C8','#F7DC6F'];
let spinAngle = 0, spinAnim = null;

function drawWheel(rotation) {
  const canvas = document.getElementById('wheelCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const prizes = getPrizes();
  const size = canvas.width, center = size / 2, radius = center - 8;
  const sliceAngle = (2 * Math.PI) / prizes.length;

  ctx.clearRect(0, 0, size, size);
  prizes.forEach((p, i) => {
    const startA = rotation * Math.PI/180 + i * sliceAngle - Math.PI/2;
    const endA = startA + sliceAngle;
    ctx.beginPath();
    ctx.moveTo(center, center);
    ctx.arc(center, center, radius, startA, endA);
    ctx.closePath();
    ctx.fillStyle = WHEEL_COLORS[i % WHEEL_COLORS.length];
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.save();
    ctx.translate(center, center);
    ctx.rotate(startA + sliceAngle/2);
    ctx.fillStyle = '#333';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(p.icon, radius * 0.65, 4);
    const name = p.name.length > 4 ? p.name.slice(0,4)+'..' : p.name;
    ctx.font = '9px sans-serif';
    ctx.fillText(name, radius * 0.65, 16);
    ctx.restore();
  });

  // Center
  ctx.beginPath();
  ctx.arc(center, center, 22, 0, 2*Math.PI);
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.strokeStyle = '#ddd'; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = '#333';
  ctx.font = 'bold 16px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('🎰', center, center);

  // Pointer
  ctx.beginPath();
  ctx.moveTo(center, 4); ctx.lineTo(center - 10, 20); ctx.lineTo(center + 10, 20);
  ctx.closePath();
  ctx.fillStyle = '#FF6B35'; ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
}

function spin() {
  // Only spin for today, use pooled points (today + past 3 days makeup)
  if (getAvailableForLottery() < getDailyThreshold()) {
    showMsg('可用积分不足（含补卡共需'+getDailyThreshold()+'分），无法抽奖', 'err');
    return;
  }
  const prizes = getPrizes();
  const totalProb = prizes.reduce((s,p) => s + p.prob, 0);
  let r = Math.random() * totalProb;
  let targetIdx = prizes.length - 1;
  for (let i = 0; i < prizes.length; i++) {
    r -= prizes[i].prob;
    if (r <= 0) { targetIdx = i; break; }
  }
  const selectedPrize = prizes[targetIdx];
  const sliceAngle = 360 / prizes.length;
  const sliceCenter = targetIdx * sliceAngle + sliceAngle / 2;
  const targetAngle = 360 - sliceCenter;
  const fullSpins = (5 + Math.floor(Math.random()*4)) * 360;
  const finalAngle = spinAngle + fullSpins + targetAngle - (spinAngle % 360);

  const startAngle = spinAngle;
  const startTime = performance.now();
  const duration = 3500;

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    spinAngle = startAngle + (finalAngle - startAngle) * eased;
    drawWheel(spinAngle);
    if (progress < 1) spinAnim = requestAnimationFrame(animate);
    else {
      const spinDate = today(); // Always spin for today, never a past date
      // Record
      const history = getLotteryHistory();
      const record = { id: Date.now(), name: selectedPrize.name, icon: selectedPrize.icon, date: spinDate, redeemed: false };
      history.push(record);
      setLotteryHistory(history);

      // Record each spin (deducts from available points)
      const unlocks = getUnlocks();
      unlocks.push({ date: spinDate, id: Date.now() });
      setUnlocks(unlocks);

      // Coupon
      if (selectedPrize.name.includes('免练字')) {
        const coupons = getCoupons();
        coupons.push({ id: Date.now(), taskName: '语文练字', wonDate: spinDate, used: false });
        setCoupons(coupons);
      } else if (selectedPrize.name.includes('免体能')) {
        const coupons = getCoupons();
        coupons.push({ id: Date.now(), taskName: '体能训练', wonDate: spinDate, used: false });
        setCoupons(coupons);
      }

      // Bonus points from lottery
      let bonusEarned = 0;
      const match = selectedPrize.name.match(/积分\+(\d+)/);
      if (match) {
        bonusEarned = parseInt(match[1]);
        const bp = getBonusPoints();
        bp[spinDate] = (bp[spinDate] || 0) + bonusEarned;
        setBonusPoints(bp);
      }

      // Show result
      let hint = '';
      if (['大餐','玩具','礼物'].includes(selectedPrize.name)) hint = '🎉 恭喜！请找家长兑换！';
      else if (selectedPrize.name.includes('免')) hint = '🎫 免做券已发放，可在打卡页面使用';
      else if (selectedPrize.name === '谢谢参与') hint = '😅 再接再厉，明天继续加油！';
      else if (bonusEarned > 0) hint = '⭐ +'+bonusEarned+'积分已到账！可用于继续抽奖';
      else hint = '⭐ 积分已累计！';

      document.getElementById('spinResult').innerHTML = `<div class="spin-result">
        <div class="result-icon">${selectedPrize.icon}</div>
        <div class="result-name">${selectedPrize.name}</div>
        <p class="result-hint">${hint}</p>
        <button class="btn btn-primary" onclick="render()">好的</button></div>`;
    }
  }
  spinAnim = requestAnimationFrame(animate);
}

// Allowed checkin window: today and past 3 days
function allowedDateRange() {
  const t = new Date(); t.setHours(0,0,0,0);
  const earliest = new Date(t); earliest.setDate(earliest.getDate() - 3);
  return {
    max: t.toISOString().slice(0, 10),
    min: earliest.toISOString().slice(0, 10),
  };
}

function isDateAllowed(dateStr) {
  return dateStr >= allowedDateRange().min && dateStr <= allowedDateRange().max;
}

function changeDate(delta) {
  const d = new Date(currentDate + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  const newDate = d.toISOString().slice(0, 10);
  if (!isDateAllowed(newDate)) {
    showMsg(newDate > today() ? '不能提前打卡未来的日期' : '仅支持过去3天内补卡', 'err');
    return;
  }
  currentDate = newDate;
  expandedTask = null;
  render();
}

function openDate(date) {
  if (!isDateAllowed(date)) {
    showMsg('仅支持今天和过去3天内的日期', 'err');
    return;
  }
  currentDate = date;
  currentView = 'daily';
  expandedTask = null;
  render();
}

async function handleUpload(taskId, input) {
  if (!input.files.length) return;
  const key = `${currentDate}_${taskId}`;
  const checkins = getCheckins();
  let cin = checkins[key] || { status: 'done', note: '', photos: [] };
  cin.status = 'done';

  for (const file of input.files) {
    try {
      const photoId = await savePhoto(file);
      cin.photos.push(photoId);
    } catch(e) { showMsg('上传失败: '+e.message, 'err'); }
  }
  checkins[key] = cin;
  setCheckins(checkins);
  input.value = '';
  expandedTask = taskId;
  render();
  showMsg('📸 上传成功！', 'ok');
}

// ===== PERSISTENCE =====
function requestPersistence() {
  if ('storage' in navigator && 'persist' in navigator.storage) {
    navigator.storage.persist().then(granted => {
      if (granted) console.log('✅ 数据持久化已启用');
    });
  }
}

// Auto-backup on significant changes (debounced, 5s after last change)
let backupTimer = null;
function scheduleBackup() {
  if (backupTimer) clearTimeout(backupTimer);
  backupTimer = setTimeout(() => {
    try {
      const data = {
        tasks: getTasks(),
        prizes: getPrizes(),
        checkins: getCheckins(),
        travelDays: getTravelDays(),
        lotteryHistory: getLotteryHistory(),
        coupons: getCoupons(),
        unlocks: getUnlocks(),
        dailyThreshold: getDailyThreshold(),
        bonusPoints: getBonusPoints(),
        saved: new Date().toISOString(),
      };
      localStorage.setItem('_autobackup', JSON.stringify(data));
      localStorage.setItem('_lastSave', new Date().toISOString());
    } catch(e) { /* quota exceeded, ignore */ }
  }, 2000);
}

function lastSaveTime() {
  const t = localStorage.getItem('_lastSave');
  if (!t) return null;
  const d = new Date(t);
  const now = new Date();
  const diff = Math.floor((now - d) / 60000);
  if (diff < 1) return '刚刚';
  if (diff < 60) return diff+'分钟前';
  return Math.floor(diff/60)+'小时前';
}

// Restore from auto-backup
function restoreAutoBackup() {
  try {
    const raw = localStorage.getItem('_autobackup');
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (data.tasks) setTasks(data.tasks);
    if (data.prizes) LS.set('prizes', data.prizes);
    if (data.checkins) setCheckins(data.checkins);
    if (data.travelDays) setTravelDays(data.travelDays);
    if (data.lotteryHistory) setLotteryHistory(data.lotteryHistory);
    if (data.coupons) setCoupons(data.coupons);
    if (data.unlocks) setUnlocks(data.unlocks);
    if (data.dailyThreshold) LS.set('dailyThreshold', data.dailyThreshold);
    if (data.dailyThreshold) LS.set('dailyThreshold', data.dailyThreshold);
    if (data.bonusPoints) LS.set('bonus_points', data.bonusPoints);
    return true;
  } catch(e) { return false; }
}

// Override set functions to auto-save
const _setCheckins = setCheckins;
const _setTravelDays = setTravelDays;
const _setLotteryHistory = setLotteryHistory;
const _setCoupons = setCoupons;
const _setUnlocks = setUnlocks;
const _setTasks = setTasks;
const _setBonusPoints = setBonusPoints;

setCheckins = function(v) { _setCheckins(v); scheduleBackup(); };
setTravelDays = function(v) { _setTravelDays(v); scheduleBackup(); };
setLotteryHistory = function(v) { _setLotteryHistory(v); scheduleBackup(); };
setCoupons = function(v) { _setCoupons(v); scheduleBackup(); };
setUnlocks = function(v) { _setUnlocks(v); scheduleBackup(); };
setTasks = function(v) { _setTasks(v); scheduleBackup(); };
setBonusPoints = function(v) { _setBonusPoints(v); scheduleBackup(); };
LS.set = function(k, v) {
  localStorage.setItem(k, JSON.stringify(v));
  if (['tasks','prizes','checkins','travel_days','lottery_history','coupons','unlocks','dailyThreshold','bonus_points'].includes(k)) {
    scheduleBackup();
  }
};

openDB().then(() => {
  requestPersistence();

  // Check if fresh start (no tasks in localStorage)
  const hasData = localStorage.getItem('tasks') !== null;
  if (!hasData) {
    // Try to restore from auto-backup
    const restored = restoreAutoBackup();
    if (restored) {
      render();
      showMsg('🔄 已自动恢复数据（上次保存：'+lastSaveTime()+'）', 'ok');
    } else {
      // Show restore screen
      document.getElementById('app').innerHTML = `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#FFF8F0,#FFE0CC);font-family:system-ui,sans-serif"><div style="background:#fff;border-radius:24px;padding:40px 28px;box-shadow:0 8px 32px rgba(0,0,0,0.1);text-align:center;max-width:360px;width:100%"><div style="font-size:4rem;margin-bottom:12px">🏖️</div><h1 style="color:#FF6B35;margin-bottom:8px">暑假打卡</h1><p style="color:#7F8C8D;margin-bottom:24px">欢迎使用！请导入备份文件来恢复数据，<br>或直接开始新的打卡之旅</p><label style="display:block;padding:14px;background:linear-gradient(135deg,#FF6B35,#FF8C42);color:#fff;border-radius:12px;font-weight:700;cursor:pointer;margin-bottom:12px">📥 导入备份文件<input type="file" accept=".json" style="display:none" onchange="handleStartupImport(this)"></label><button onclick="freshStart()" style="width:100%;padding:14px;background:#fff;border:2px solid #ECF0F1;border-radius:12px;font-size:.95rem;cursor:pointer;color:#2C3E50">✨ 直接开始</button></div></div>`;
    }
  } else {
    render();
  }

  // Save on page close
  window.addEventListener('beforeunload', () => {
    scheduleBackup();
    // Force immediate save
    if (backupTimer) { clearTimeout(backupTimer); backupTimer = null; }
    const data = {
      tasks: getTasks(), prizes: getPrizes(), checkins: getCheckins(),
      travelDays: getTravelDays(), lotteryHistory: getLotteryHistory(),
      coupons: getCoupons(), unlocks: getUnlocks(),
      dailyThreshold: getDailyThreshold(),
      bonusPoints: getBonusPoints(), saved: new Date().toISOString(),
    };
    try { localStorage.setItem('_autobackup', JSON.stringify(data)); } catch(e) {}
  });

  // Periodic full backup every 5 min
  setInterval(() => scheduleBackup(), 300000);
}).catch(err => {
  document.getElementById('app').innerHTML = `<div style="text-align:center;padding:40px"><h2>❌ 初始化失败</h2><p>${err.message}</p><p>请尝试刷新页面</p></div>`;
});

function handleStartupImport(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (data.tasks) setTasks(data.tasks);
      if (data.prizes) LS.set('prizes', data.prizes);
      if (data.checkins) setCheckins(data.checkins);
      if (data.travelDays) setTravelDays(data.travelDays);
      if (data.lotteryHistory) setLotteryHistory(data.lotteryHistory);
      if (data.coupons) setCoupons(data.coupons);
      if (data.unlocks) setUnlocks(data.unlocks);
      if (data.dailyThreshold) LS.set('dailyThreshold', data.dailyThreshold);
      if (data.dailyThreshold) LS.set('dailyThreshold', data.dailyThreshold);
      if (data.bonusPoints) LS.set('bonus_points', data.bonusPoints);
      scheduleBackup();
      render();
      showMsg('📥 数据已恢复！', 'ok');
    } catch(e) { showMsg('文件格式错误', 'err'); }
  };
  reader.readAsText(file);
}

function freshStart() {
  // Clear any auto-backup, keep defaults from code
  localStorage.removeItem('_autobackup');
  render();
  showMsg('✨ 全新开始！', 'ok');
}
</script>
</body>
</html>
