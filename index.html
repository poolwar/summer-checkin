<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>рҹҸ–пёҸ жҡ‘еҒҮжү“еҚЎ</title>
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#E8845C;--primary-dark:#D4734B;--success:#5DAF7C;--danger:#D9706A;
  --warning:#D4A54A;--bg:#FFF9F5;--card-bg:#FFFFFF;--text:#3D3D3D;
  --text-light:#8C8C8C;--border:#E8E3DF;--radius:18px;--shadow:0 2px 16px rgba(0,0,0,0.06);
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg);color:var(--text);line-height:1.7;font-size:24px;-webkit-font-smoothing:antialiased;
}
#app{max-width:640px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}

/* ===== Header ===== */
header{
  background:linear-gradient(135deg,#E8845C,#EFA57D);color:#fff;padding:16px 20px;
  text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 10px rgba(232,132,92,0.25);
}
header h1{font-size:1.1rem;font-weight:700;letter-spacing:1px}

/* ===== Main ===== */
main{flex:1;padding:20px 16px 90px;overflow-y:auto}
.page{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ===== Bottom Nav ===== */
nav.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;
  height:72px;background:#fff;display:flex;justify-content:space-around;align-items:center;
  border-top:1px solid var(--border);box-shadow:0 -2px 12px rgba(0,0,0,0.04);z-index:100;
}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;
  color:var(--text-light);font-size:.6rem;padding:8px 14px;border-radius:14px;cursor:pointer;
  border:none;background:none;font-family:inherit;transition:all .2s;min-width:48px}
.nav-item .nav-icon{font-size:1.1rem}
.nav-item.active{color:var(--primary);background:#FFF0E8}

/* ===== Cards ===== */
.card{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:18px}
.card h2{font-size:.9rem;margin-bottom:10px}
.card h3{font-size:.8rem;margin-bottom:6px}

/* ===== Stats ===== */
.stats{display:flex;justify-content:space-around;background:#fff;border-radius:var(--radius);
  padding:20px 16px;margin-bottom:18px;box-shadow:var(--shadow)}
.stat{display:flex;flex-direction:column;align-items:center;gap:4px}
.stat-icon{font-size:1.3rem}
.stat-val{font-size:1.3rem;font-weight:700;color:var(--primary)}
.stat-lbl{font-size:.65rem;color:var(--text-light)}

/* ===== Progress ===== */
.progress-track{width:100%;height:28px;background:#F5F0ED;border-radius:14px;overflow:hidden;margin:10px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,#E8845C,#EFA57D);border-radius:14px;
  transition:width .5s;display:flex;align-items:center;justify-content:center;font-size:.7rem;
  font-weight:700;color:#fff;min-width:0}
.progress-fill.complete{background:linear-gradient(90deg,#5DAF7C,#7DC99B)}

/* ===== Task Items ===== */
.task-item{
  display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:14px;cursor:pointer;
  border:2px solid transparent;margin-bottom:8px;transition:all .2s;background:#FFF9F5;border-color:#F0E0D5;
}
.task-item:active{transform:scale(.98)}
.task-item.done{background:#F4FAF6;border-color:#C8E6D0;opacity:.85}
.task-item .task-emoji{font-size:1.2rem}
.task-item .task-name{flex:1;font-weight:500;font-size:.85rem}
.task-item .task-badge{font-size:1rem;flex-shrink:0}

/* ===== Task Detail Card ===== */
.task-detail-card{background:#fff;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);
  border:2px solid transparent;margin-bottom:12px;transition:all .3s}
.task-detail-card.done{border-color:#C8E6D0}
.task-detail-card.expanded{border-color:var(--primary)}
.task-detail-header{display:flex;align-items:center;gap:14px;padding:16px 18px;cursor:pointer;user-select:none}
.task-detail-header .task-emoji{font-size:1.5rem}
.task-detail-info{flex:1}
.task-detail-info strong{display:block;font-size:.85rem}
.task-detail-info .status-text{font-size:.65rem;color:var(--text-light)}
.task-detail-body{padding:0 18px 18px;border-top:1px solid var(--border);padding-top:14px;animation:fadeIn .3s}

/* ===== Check Button ===== */
.btn-check{width:40px;height:40px;border-radius:50%;border:3px solid #DDD;background:#fff;
  font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;flex-shrink:0}
.btn-check.checked{background:var(--success);border-color:var(--success);color:#fff}

/* ===== Buttons ===== */
.btn{
  display:inline-block;padding:12px 24px;border:none;border-radius:12px;font-size:.8rem;
  font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s
}
.btn:active{transform:scale(.97)}
.btn-primary{display:block;width:100%;padding:16px;background:linear-gradient(135deg,#E8845C,#EFA57D);
  color:#fff;font-size:.85rem;font-weight:700;letter-spacing:.5px}
.btn-sm{padding:10px 20px;background:#F5F0ED;color:var(--text);font-size:.7rem}
.btn-sm:active{background:#E8E3DF}
.btn-danger{display:block;width:100%;padding:16px;background:#fff;color:var(--danger);
  border:2px solid var(--danger);font-size:.8rem}
.btn-coupon{padding:8px 14px;background:#FFF8E5;border:1px solid #F0E0C0;border-radius:10px;
  font-size:.7rem;cursor:pointer;color:#8B7D4A}

/* ===== Date Picker ===== */
.date-picker{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.date-picker button{width:44px;height:44px;background:#fff;border:2px solid var(--border);
  border-radius:50%;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.date-picker button:active{background:#F5F0ED}
.date-display{text-align:center}
.date-display span{display:block;font-size:.9rem;font-weight:700}
.date-display .badge{display:inline-block;padding:3px 12px;border-radius:10px;font-size:.6rem;margin:3px 0}
.badge-travel{background:#D6EAF8;color:#456E8C}
.badge-today{background:#F0E0D5;color:var(--primary)}

/* ===== Upload ===== */
.upload-label{display:inline-block;padding:12px 24px;background:#F5F8FC;border:2px dashed #C8D8E8;
  border-radius:12px;cursor:pointer;font-size:.8rem;transition:all .2s;margin-bottom:8px}
.upload-label:active{background:#E8F0F8}
.upload-hint{display:block;font-size:.6rem;color:var(--text-light);margin:4px 0 10px}
.files-preview{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.file-thumb{position:relative;width:90px;height:90px;border-radius:10px;overflow:hidden;
  background:#F5F5F5;border:1px solid var(--border)}
.file-thumb img{width:100%;height:100%;object-fit:cover;cursor:pointer}
.file-thumb .file-name{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.55);
  color:#fff;font-size:.65rem;padding:2px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-del-file{position:absolute;top:3px;right:3px;width:24px;height:24px;border-radius:50%;
  background:var(--danger);color:#fff;border:none;font-size:.7rem;cursor:pointer}
.note-section{margin-bottom:10px}
.note-section textarea{width:100%;padding:12px;border:1px solid var(--border);border-radius:10px;
  font-family:inherit;font-size:.75rem;resize:vertical;margin-bottom:8px}
.note-section textarea:focus{outline:none;border-color:var(--primary)}
.coupon-section{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:.75rem;
  margin-top:10px;padding-top:10px;border-top:1px dashed var(--border)}
.mini-progress{display:flex;align-items:center;gap:14px;font-size:.75rem;font-weight:600;margin:10px 0 18px}
.mini-progress .bar{flex:1;height:12px;background:#F5F0ED;border-radius:6px;overflow:hidden}
.mini-progress .bar .fill{border-radius:6px;height:100%;background:linear-gradient(90deg,#E8845C,#EFA57D)}

/* ===== Calendar ===== */
.month-picker{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.month-picker h2{font-size:.9rem}
.cal-stats{display:flex;justify-content:center;gap:20px;margin-bottom:18px;font-size:.7rem;
  color:var(--text-light);flex-wrap:wrap}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:18px}
.cal-hdr{text-align:center;font-size:.65rem;font-weight:700;color:var(--text-light);padding:10px 0}
.cal-cell{aspect-ratio:1;border-radius:12px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;cursor:pointer;transition:all .2s;font-size:.7rem;position:relative;
  min-height:56px;padding:2px 0}
.cal-cell:active{transform:scale(.92)}
.cal-cell .day-num{font-weight:600;font-size:.75rem}
.cal-cell .day-wk{font-size:.5rem;color:inherit}
.cal-cell .day-icon{font-size:.6rem}
.cal-cell .day-prog{font-size:.5rem;color:var(--text-light)}
.cell-full{background:#C8E6C9;border:2px solid #5DAF7C;color:#2E5A3A}
.cell-part{background:#FFECB3;border:2px solid #D4A54A;color:#6B5200}
.cell-none{background:#FAFAFA;border:2px solid #E8E3DF;color:#AAA}
.cell-travel{background:#D6EAF8;border:2px solid #7BAEC8}
.is-today{box-shadow:0 0 0 3px var(--primary);z-index:1}
.cell-oor{opacity:.35;cursor:not-allowed}
.cal-legend{display:flex;flex-wrap:wrap;gap:10px;font-size:.65rem;color:var(--text-light);align-items:center}
.legend-dot{display:inline-block;width:14px;height:14px;border-radius:4px;margin-right:5px}
.legend-dot.green{background:#C8E6C9;border:1px solid #5DAF7C}
.legend-dot.yellow{background:#FFECB3;border:1px solid #D4A54A}
.legend-dot.gray{background:#FAFAFA;border:1px solid #E8E3DF}
.legend-dot.blue{background:#D6EAF8;border:1px solid #7BAEC8}
.legend-hint{width:100%;font-size:.8rem;margin-top:4px}

/* ===== Lottery ===== */
.tabs{display:flex;gap:10px;margin-bottom:18px}
.tabs button{flex:1;padding:12px;background:#fff;border:2px solid var(--border);
  border-radius:12px;font-size:.8rem;font-weight:600;cursor:pointer}
.tabs button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.wheel-wrap{display:flex;justify-content:center;margin:20px 0}
.wheel-actions{text-align:center;margin:20px 0}
.btn-spin{padding:18px 56px;background:linear-gradient(135deg,#E8845C,#D4734B);color:#fff;
  border:none;border-radius:50px;font-size:1rem;font-weight:700;cursor:pointer;
  box-shadow:0 4px 20px rgba(232,132,92,0.35);animation:pulse 2s infinite}
.btn-spin:active{transform:scale(.95)}
@keyframes pulse{0%,100%{box-shadow:0 4px 20px rgba(232,132,92,0.35)}50%{box-shadow:0 4px 36px rgba(232,132,92,0.55)}}
.cannot-spin{color:var(--text-light);font-size:.8rem;padding:14px;background:#FAFAFA;border-radius:12px}
.spin-result{text-align:center;background:#fff;border-radius:var(--radius);padding:28px;
  box-shadow:var(--shadow);animation:popIn .5s;position:relative;overflow:hidden}
.spin-result.big-prize{border:3px solid #FFD700;box-shadow:0 0 30px rgba(255,215,0,0.3)}
.spin-result .result-glow{position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(circle,rgba(255,215,0,0.15),transparent 70%);pointer-events:none}
@keyframes popIn{0%{transform:scale(.3) rotate(-5deg);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
.result-icon{font-size:3.5rem;animation:bounce .4s infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.result-name{font-size:1.2rem;font-weight:700;margin:14px 0 10px;color:var(--primary)}
.result-hint{color:var(--text-light);font-size:.8rem;margin-bottom:18px}
.wheel-canvas{max-width:100%;height:auto;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.15))}
.prize-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.prize-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fff;
  border-radius:10px;font-size:.75rem}
.prize-item .prob{margin-left:auto;font-weight:600;color:var(--primary)}
.history-item{display:flex;align-items:center;gap:14px;background:#fff;padding:14px 16px;
  border-radius:14px;box-shadow:var(--shadow);margin-bottom:10px}
.history-item .h-icon{font-size:1.5rem}
.history-item .h-info{flex:1}
.history-item .h-info strong{display:block;font-size:.8rem}
.history-item .h-date{font-size:.65rem;color:var(--text-light)}

/* ===== Settings ===== */
.settings-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#FAFAFA;
  border-radius:12px;font-size:.75rem;margin-bottom:8px}
.btn-toggle{margin-left:auto;padding:6px 16px;border-radius:20px;border:none;font-size:.65rem;
  font-weight:600;cursor:pointer}
.btn-toggle.on{background:#D4EDDA;color:#356A44}
.btn-toggle.off{background:#F8D7DA;color:#7A3A3A}
.input-group{margin-bottom:14px}
.input-group label{display:block;font-size:.75rem;font-weight:600;margin-bottom:6px}
.input-group input,.input-group textarea{width:100%;padding:12px 16px;border:2px solid var(--border);
  border-radius:12px;font-size:.8rem;font-family:inherit}
.input-group input:focus,.input-group textarea:focus{outline:none;border-color:var(--primary)}

/* ===== Messages ===== */
.msg{position:fixed;top:80px;left:50%;transform:translateX(-50%);padding:12px 24px;
  border-radius:24px;font-size:.75rem;z-index:200;animation:fadeIn .3s;pointer-events:none}
.msg-err{background:#FDE8E8;color:var(--danger)}
.msg-ok{background:#D4EDDA;color:#356A44}

/* ===== Coupons & Teaser ===== */
.coupons-card{margin-bottom:18px}
.coupons-card h3{font-size:.8rem;margin-bottom:12px}
.coupon-item{display:flex;align-items:center;gap:10px;background:#FFF8E5;padding:12px;
  border-radius:12px;font-size:.75rem;margin-bottom:8px}
.coupon-item .c-date{margin-left:auto;font-size:.65rem;color:var(--text-light)}
.lottery-teaser{display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,#FFF8E5,#FFF0D0);
  border-radius:var(--radius);padding:18px;cursor:pointer;margin-bottom:18px;border:2px solid #D4A54A}
.lottery-teaser:active{transform:scale(.98)}
.teaser-icon{font-size:2rem}
.lottery-teaser strong{display:block;color:#8B7D4A;font-size:.85rem}
.lottery-teaser p{font-size:.7rem;color:#A09060}

/* ===== All done ===== */
.all-done{text-align:center;padding:28px;background:#fff;border-radius:var(--radius);
  box-shadow:var(--shadow);margin-top:18px}
.all-done .icon{font-size:3.5rem;animation:bounce .6s infinite alternate}
.all-done p{font-size:1rem;font-weight:700;margin:10px 0 18px}

/* ===== Responsive ===== */
@media(min-width:768px){#app{max-width:768px}nav.bottom-nav{max-width:768px}}
@media(min-width:1024px){#app{max-width:1024px}nav.bottom-nav{max-width:1024px}}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#E8E3DF;border-radius:6px}
.empty-msg{text-align:center;color:var(--text-light);padding:40px 20px;font-size:1rem}
</style>

<script>
// ===== DATABASE LAYER =====
const DB_NAME = 'SummerCheckinDB';
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('photos')) {
        d.createObjectStore('photos', { keyPath: 'id', autoIncrement: true });
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = () => reject(req.error);
  });
}

function savePhoto(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const tx = db.transaction('photos', 'readwrite');
      const store = tx.objectStore('photos');
      const req = store.add({
        filename: file.name,
        mime: file.type,
        size: file.size,
        data: reader.result,
        date: new Date().toISOString().slice(0, 10),
        created: Date.now()
      });
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    };
    reader.readAsDataURL(file);
  });
}

function getPhoto(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('photos', 'readonly');
    const req = tx.objectStore('photos').get(id);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function deletePhoto(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('photos', 'readwrite');
    const req = tx.objectStore('photos').delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

// ===== STORAGE HELPERS =====
const LS = {
  get(k, def) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } },
  set(k, v) { localStorage.setItem(k, JSON.stringify(v)); },
};

const DEFAULT_TASKS = [
  { id: 1, name: 'иҜӯж–Үз»ғеӯ—', icon: 'рҹ“қ', active: true, points: 5 },
  { id: 2, name: 'йҳ…иҜ»жү“еҚЎ', icon: 'рҹ“–', active: true, points: 5 },
  { id: 3, name: 'иғҢиҜөжү“еҚЎ', icon: 'рҹ—ЈпёҸ', active: true, points: 6 },
  { id: 4, name: 'ж•°еӯҰз»ғд№ ', icon: 'рҹ§®', active: true, points: 5 },
  { id: 5, name: 'иӢұиҜӯиғҢиҜө', icon: 'рҹ”Ө', active: true, points: 6 },
  { id: 6, name: 'дҪ“иғҪи®ӯз»ғ', icon: 'рҹҸғ', active: true, points: 8 },
  { id: 7, name: 'еҲ·зў—', icon: 'рҹ§№', active: true, points: 5 },
  { id: 8, name: 'е®¶еҠЎ', icon: 'рҹ§№', active: true, points: 5 },
  { id: 9, name: 'иӢұеӯҡиӢұиҜӯжү“еҚЎ', icon: 'рҹ“қ', active: true, points: 6 },
];

const DEFAULT_PRIZES = [
  { id: 1, name: 'еӨ§йӨҗ', icon: 'рҹҚ•', prob: 0.03 },
  { id: 2, name: 'зҺ©е…·', icon: 'рҹҺҒ', prob: 0.05 },
  { id: 3, name: 'зӨјзү©-йӘҢеҚЎ', icon: 'рҹҺҖ', prob: 0.08 },
  { id: 4, name: 'е…Қз»ғеӯ—дёҖж¬Ў', icon: 'рҹҺ«', prob: 0.10 },
  { id: 5, name: 'е…ҚдҪ“иғҪдёҖж¬Ў', icon: 'рҹҸ…', prob: 0.10 },
  { id: 6, name: 'з§ҜеҲҶ+10', icon: 'вӯҗ', prob: 0.25 },
  { id: 7, name: 'з§ҜеҲҶ+5', icon: 'рҹҢҹ', prob: 0.24 },
  { id: 8, name: 'еҗ¬ж•…дәӢд№Ұ1е°Ҹж—¶', icon: 'рҹҺ§', prob: 0.10 },
  { id: 9, name: 'зңӢи§Ҷйў‘20еҲҶй’ҹ', icon: 'рҹ“ұ', prob: 0.05 },
];

function getTasks() { return LS.get('tasks', DEFAULT_TASKS); }
function getActiveTasks() { return getTasks().filter(t => t.active); }
function getPrizes() { return LS.get('prizes', DEFAULT_PRIZES); }
function getCheckins() { return LS.get('checkins', {}); }
function getTravelDays() { return LS.get('travel_days', []); }
function getLotteryHistory() { return LS.get('lottery_history', []); }
function getCoupons() { return LS.get('coupons', []); }
function getUnlocks() { return LS.get('unlocks', []); }
function getDailyThreshold() { return LS.get('dailyThreshold', 30); }

// Calculate earned points and spin deductions for a date
function getBonusPoints() { return LS.get('bonus_points', {}); }
function setBonusPoints(v) { LS.set('bonus_points', v); }

function getDayPoints(dateStr) {
  const checkins = getCheckins();
  const tasks = getActiveTasks();
  let earned = 0;
  tasks.forEach(t => {
    const key = dateStr+'_'+t.id;
    if (checkins[key]?.status === 'done') earned += (t.points || 0);
  });
  const unlocks = getUnlocks();
  const dayUnlocks = unlocks.filter(u => u.date === dateStr).length;
  const threshold = getDailyThreshold();
  const spent = dayUnlocks * threshold;
  const bonus = getBonusPoints()[dateStr] || 0;
  return { earned, spent, bonus, available: Math.max(0, earned - spent + bonus) };
}

// Pooled available for lottery: today + past 3 days' earned + bonus - today's spins
function getAvailableForLottery() {
  let totalEarned = 0, totalBonus = 0;
  const range = allowedDateRange();
  const [y0, m0, d0] = range.min.split('-').map(Number);
  const [y1, m1, d1] = range.max.split('-').map(Number);
  let d = new Date(y0, m0-1, d0);
  const end = new Date(y1, m1-1, d1);
  while (d <= end) {
    const ds = fmtDate(d);
    totalEarned += getDayPoints(ds).earned;
    totalBonus += getBonusPoints()[ds] || 0;
    d.setDate(d.getDate() + 1);
  }
  const todaySpins = getUnlocks().filter(u => u.date === today()).length;
  const spent = todaySpins * getDailyThreshold();
  return Math.max(0, totalEarned + totalBonus - spent);
}

function setCheckins(v) { LS.set('checkins', v); }
function setTravelDays(v) { LS.set('travel_days', v); }
function setLotteryHistory(v) { LS.set('lottery_history', v); }
function setCoupons(v) { LS.set('coupons', v); }
function setUnlocks(v) { LS.set('unlocks', v); }
function setTasks(v) { LS.set('tasks', v); }

// Local time: avoids UTC offset bugs (China = UTC+8)
function fmtDate(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function today() { return fmtDate(new Date()); }

function showMsg(text, type) {
  const existing = $('.msg');
  if (existing) existing.remove();
  const div = document.createElement('div');
  div.className = `msg msg-${type}`;
  div.textContent = text;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 2500);
}

// ===== WHEEL CANVAS =====
const WHEEL_COLORS = [
  ['#FF6B6B','#E55A5A'], ['#4ECDC4','#3BB5AC'], ['#FFA94D','#F09030'], ['#96CEB4','#7BB89A'],
  ['#FFD93D','#F0C820'], ['#C792EA','#B07ADE'], ['#6BCB77','#50B35E'], ['#FF8A80','#F07066'],
  ['#4FC3F7','#30A8D8'], ['#AED581','#95C068'], ['#FFB74D','#F0A030'], ['#BA68C8','#A050B8']
];
let spinAngle = 0, spinAnim = null;
let particles = [];

function drawWheel(rotation) {
  const canvas = document.getElementById('wheelCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const prizes = getPrizes();
  const size = canvas.width, center = size / 2, outerR = center - 6, innerR = 30;
  const sliceAngle = (2 * Math.PI) / prizes.length;

  ctx.clearRect(0, 0, size, size);

  // Outer shadow ring
  ctx.beginPath();
  ctx.arc(center, center, outerR + 4, 0, 2*Math.PI);
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fill();

  // Decorative outer ring with dots
  ctx.beginPath();
  ctx.arc(center, center, outerR + 1, 0, 2*Math.PI);
  ctx.strokeStyle = '#D4A54A';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Light bulbs on outer ring
  for (let i = 0; i < 32; i++) {
    const a = (i / 32) * Math.PI * 2;
    const bx = center + Math.cos(a) * (outerR + 2);
    const by = center + Math.sin(a) * (outerR + 2);
    ctx.beginPath();
    ctx.arc(bx, by, 3, 0, 2*Math.PI);
    ctx.fillStyle = Math.floor(Date.now()/300 + i) % 2 ? '#FFD700' : '#FFF';
    ctx.fill();
    ctx.strokeStyle = '#C0A030';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Draw slices
  prizes.forEach((p, i) => {
    const startA = rotation * Math.PI/180 + i * sliceAngle - Math.PI/2;
    const endA = startA + sliceAngle;
    const colors = WHEEL_COLORS[i % WHEEL_COLORS.length];

    // Slice with gradient
    ctx.beginPath();
    ctx.moveTo(center, center);
    ctx.arc(center, center, outerR, startA, endA);
    ctx.closePath();
    const grad = ctx.createRadialGradient(center, center, innerR, center, center, outerR);
    grad.addColorStop(0, colors[0]);
    grad.addColorStop(1, colors[1]);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Inner highlight
    ctx.beginPath();
    ctx.moveTo(center, center);
    ctx.arc(center, center, outerR * 0.5, startA, endA);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fill();

    // Text
    ctx.save();
    ctx.translate(center, center);
    ctx.rotate(startA + sliceAngle/2);

    // Text shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(p.icon, outerR * 0.62, 6);

    // Icon
    ctx.fillStyle = '#fff';
    ctx.fillText(p.icon, outerR * 0.62, 5);

    // Name with outline
    const name = p.name.length > 5 ? p.name.slice(0,5)+'вҖҰ' : p.name;
    ctx.font = 'bold 11px sans-serif';
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 2.5;
    ctx.strokeText(name, outerR * 0.62, 20);
    ctx.fillStyle = '#fff';
    ctx.fillText(name, outerR * 0.62, 20);

    ctx.restore();
  });

  // Inner decorative ring
  ctx.beginPath();
  ctx.arc(center, center, innerR + 6, 0, 2*Math.PI);
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  ctx.fill();

  // Center hub
  const hubGrad = ctx.createRadialGradient(center-4, center-4, 2, center, center, innerR);
  hubGrad.addColorStop(0, '#FFF');
  hubGrad.addColorStop(0.5, '#F5F0ED');
  hubGrad.addColorStop(1, '#D4A54A');
  ctx.beginPath();
  ctx.arc(center, center, innerR, 0, 2*Math.PI);
  ctx.fillStyle = hubGrad;
  ctx.fill();
  ctx.strokeStyle = '#C0A030';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Center icon
  ctx.fillStyle = '#555';
  ctx.font = 'bold 20px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('рҹҺ°', center, center);

  // Pointer (top center)
  const px = center, py = 0;
  // Glow
  ctx.beginPath();
  ctx.moveTo(px, outerR - 34);
  ctx.lineTo(px - 16, outerR + 4);
  ctx.lineTo(px + 16, outerR + 4);
  ctx.closePath();
  ctx.fillStyle = 'rgba(232,132,92,0.2)';
  ctx.fill();

  // Pointer body
  ctx.beginPath();
  ctx.moveTo(px, outerR - 38);
  ctx.lineTo(px - 14, outerR);
  ctx.lineTo(px + 14, outerR);
  ctx.closePath();
  const ptrGrad = ctx.createLinearGradient(center, outerR-38, center, outerR);
  ptrGrad.addColorStop(0, '#E8845C');
  ptrGrad.addColorStop(1, '#D4734B');
  ctx.fillStyle = ptrGrad;
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Pointer tip
  ctx.beginPath();
  ctx.arc(px, outerR - 38, 5, 0, 2*Math.PI);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.strokeStyle = '#E8845C';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

function spawnConfetti() {
  const colors = ['#FF6B6B','#FFD93D','#4ECDC4','#FF8A80','#96CEB4','#FFA94D','#C792EA','#6BCB77'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.style.cssText = 'position:fixed;width:'+(6+Math.random()*10)+'px;height:'+(6+Math.random()*10)+'px;background:'+colors[Math.floor(Math.random()*colors.length)]+';border-radius:'+(Math.random()>.5?'50%':'2px')+';pointer-events:none;z-index:9999;left:'+(10+Math.random()*80)+'%;top:-20px;animation:confettiFall '+(1.5+Math.random()*2)+'s ease-out forwards;animation-delay:'+Math.random()*0.5+'s';
    document.body.appendChild(el);
    setTimeout(function(){ el.remove(); }, 3500);
  }
  // Inject keyframe if not exists
  if (!document.getElementById('confettiStyle')) {
    var style = document.createElement('style');
    style.id = 'confettiStyle';
    style.textContent = '@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}';
    document.head.appendChild(style);
  }
}

function spin() {
  if (getAvailableForLottery() < getDailyThreshold()) {
    showMsg('еҸҜз”Ёз§ҜеҲҶдёҚи¶іпјҲеҗ«иЎҘеҚЎе…ұйңҖ'+getDailyThreshold()+'еҲҶпјүпјҢж— жі•жҠҪеҘ–', 'err');
    return;
  }
  const prizes = getPrizes();
  const totalProb = prizes.reduce((s,p) => s + p.prob, 0);
  let r = Math.random() * totalProb;
  let targetIdx = prizes.length - 1;
  for (let i = 0; i < prizes.length; i++) {
    r -= prizes[i].prob;
    if (r <= 0) { targetIdx = i; break; }
  }
  const selectedPrize = prizes[targetIdx];
  const sliceAngle = 360 / prizes.length;
  const sliceCenter = targetIdx * sliceAngle + sliceAngle / 2;
  const targetAngle = 360 - sliceCenter;
  const fullSpins = (6 + Math.floor(Math.random()*3)) * 360;
  const finalAngle = spinAngle + fullSpins + targetAngle - (spinAngle % 360);

  const startAngle = spinAngle;
  const startTime = performance.now();
  const duration = 4000;

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    // Custom easing: fast start, slow middle, fast end (tick-tock feel)
    var eased;
    if (progress < 0.7) {
      eased = 1 - Math.pow(1 - progress/0.7, 2.5);
    } else {
      var p2 = (progress - 0.7) / 0.3;
      eased = 1 - (1 - p2) * (1 - p2) * 0.3;
    }
    spinAngle = startAngle + (finalAngle - startAngle) * Math.min(1, eased);
    drawWheel(spinAngle);
    if (progress < 1) spinAnim = requestAnimationFrame(animate);
    else {
      // Confetti!
      spawnConfetti();

      const spinDate = today();
      const history = getLotteryHistory();
      history.push({ id: Date.now(), name: selectedPrize.name, icon: selectedPrize.icon, date: spinDate, redeemed: false });
      setLotteryHistory(history);

      const unlocks = getUnlocks();
      unlocks.push({ date: spinDate, id: Date.now() });
      setUnlocks(unlocks);

      if (selectedPrize.name.includes('е…Қз»ғеӯ—')) {
        const coupons = getCoupons();
        coupons.push({ id: Date.now(), taskName: 'иҜӯж–Үз»ғеӯ—', wonDate: spinDate, used: false });
        setCoupons(coupons);
      } else if (selectedPrize.name.includes('е…ҚдҪ“иғҪ')) {
        const coupons = getCoupons();
        coupons.push({ id: Date.now(), taskName: 'дҪ“иғҪи®ӯз»ғ', wonDate: spinDate, used: false });
        setCoupons(coupons);
      }

      let bonusEarned = 0;
      const match = selectedPrize.name.match(/з§ҜеҲҶ\+(\d+)/);
      if (match) {
        bonusEarned = parseInt(match[1]);
        const bp = getBonusPoints();
        bp[spinDate] = (bp[spinDate] || 0) + bonusEarned;
        setBonusPoints(bp);
      }

      var isBig = ['еӨ§йӨҗ','зҺ©е…·','зӨјзү©'].includes(selectedPrize.name) || selectedPrize.name.includes('зӨјзү©');
      var isSkip = selectedPrize.name.includes('е…Қ');
      var isSorry = selectedPrize.name === 'и°ўи°ўеҸӮдёҺ';
      var resultClass = isBig ? 'big-prize' : isSorry ? 'sorry' : 'normal-prize';
      var hint = isBig ? 'рҹҺү жҒӯе–ңпјҒиҜ·жүҫе®¶й•ҝе…‘жҚўпјҒ' :
        isSkip ? 'рҹҺ« е…ҚеҒҡеҲёе·ІеҸ‘ж”ҫ' :
        isSorry ? 'рҹҳ… еҶҚжҺҘеҶҚеҺүпјҒ' :
        bonusEarned > 0 ? 'вӯҗ +'+bonusEarned+'з§ҜеҲҶе·ІеҲ°иҙҰпјҒ' : 'вӯҗ з§ҜеҲҶе·ІзҙҜи®ЎпјҒ';

      document.getElementById('spinResult').innerHTML =
        '<div class="spin-result '+resultClass+'">'+
        '<div class="result-glow"></div>'+
        '<div class="result-icon">'+selectedPrize.icon+'</div>'+
        '<div class="result-name">'+selectedPrize.name+'</div>'+
        '<p class="result-hint">'+hint+'</p>'+
        '<button class="btn btn-primary" onclick="render()">еҘҪзҡ„</button></div>';
    }
  }
  spinAnim = requestAnimationFrame(animate);
}

// ===== ACTIONS =====
function navTo(view) {
  if (view === 'settings' && !isAuthenticated()) {
    showSettingsPassword();
    return;
  }
  currentView = view;
  if (view === 'daily' || view === 'home') currentDate = today();
  if (view === 'lottery') currentDate = today();
  expandedTask = null;
  render();
}

// Allowed checkin window: today and past 3 days
function allowedDateRange() {
  const t = new Date();
  const earliest = new Date(t.getFullYear(), t.getMonth(), t.getDate() - 3);
  return { max: today(), min: fmtDate(earliest) };
}

function isDateAllowed(dateStr) {
  return dateStr >= allowedDateRange().min && dateStr <= allowedDateRange().max;
}

function changeDate(delta) {
  const [y,m,day] = currentDate.split('-').map(Number);
  const d = new Date(y, m-1, day);
  d.setDate(d.getDate() + delta);
  const newDate = fmtDate(d);
  if (!isDateAllowed(newDate)) {
    showMsg(newDate > today() ? 'дёҚиғҪжҸҗеүҚжү“еҚЎжңӘжқҘзҡ„ж—Ҙжңҹ' : 'д»…ж”ҜжҢҒиҝҮеҺ»3еӨ©еҶ…иЎҘеҚЎ', 'err');
    return;
  }
  currentDate = newDate;
  expandedTask = null;
  render();
}

function openDate(date) {
  if (!isDateAllowed(date)) {
    showMsg('д»…ж”ҜжҢҒд»ҠеӨ©е’ҢиҝҮеҺ»3еӨ©еҶ…зҡ„ж—Ҙжңҹ', 'err');
    return;
  }
  currentDate = date;
  currentView = 'daily';
  expandedTask = null;
  render();
}

function quickToggle(taskId) {
  const key = `${currentDate}_${taskId}`;
  const checkins = getCheckins();
  const current = checkins[key];
  const newStatus = (current && current.status === 'done') ? 'pending' : 'done';
  checkins[key] = { ...(current || {}), status: newStatus, note: current?.note || '', photos: current?.photos || [] };
  setCheckins(checkins);
  render();
}

function toggleTask(taskId) {
  quickToggle(taskId);
}

function toggleExpand(taskId) {
  expandedTask = expandedTask === taskId ? null : taskId;
  render();
}

async function handleUpload(taskId, input) {
  if (!input.files.length) return;
  const key = `${currentDate}_${taskId}`;
  const checkins = getCheckins();

    } catch(e) { showMsg('дёҠдј еӨұиҙҘ: '+e.message, 'err'); }

  input.value = '';

// ===== PERSISTENCE =====
function requestPersistence() {
  if ('storage' in navigator && 'persist' in navigator.storage) {
    navigator.storage.persist().then(granted => {
      if (granted) console.log('вң… ж•°жҚ®жҢҒд№…еҢ–е·ІеҗҜз”Ё');
    });
  }
}

// Auto-backup on significant changes (debounced, 5s after last change)
let backupTimer = null;
function scheduleBackup() {
  if (backupTimer) clearTimeout(backupTimer);
  backupTimer = setTimeout(() => {
    try {
      const data = {
        tasks: getTasks(),
        prizes: getPrizes(),
        checkins: getCheckins(),
        travelDays: getTravelDays(),
        lotteryHistory: getLotteryHistory(),
        coupons: getCoupons(),
        unlocks: getUnlocks(),
        dailyThreshold: getDailyThreshold(),
        bonusPoints: getBonusPoints(),
        saved: new Date().toISOString(),
      };
      localStorage.setItem('_autobackup', JSON.stringify(data));
      localStorage.setItem('_lastSave', new Date().toISOString());
    } catch(e) { /* quota exceeded, ignore */ }
  }, 2000);
}

function lastSaveTime() {
  const t = localStorage.getItem('_lastSave');
  if (!t) return null;
  const d = new Date(t);
  const now = new Date();
  const diff = Math.floor((now - d) / 60000);
  if (diff < 1) return 'еҲҡеҲҡ';
  if (diff < 60) return diff+'еҲҶй’ҹеүҚ';
  return Math.floor(diff/60)+'е°Ҹж—¶еүҚ';
}

// Restore from auto-backup
function restoreAutoBackup() {
  try {
    const raw = localStorage.getItem('_autobackup');
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (data.tasks) setTasks(data.tasks);
    if (data.prizes) LS.set('prizes', data.prizes);
    if (data.checkins) setCheckins(data.checkins);
    if (data.travelDays) setTravelDays(data.travelDays);
    if (data.lotteryHistory) setLotteryHistory(data.lotteryHistory);
    if (data.coupons) setCoupons(data.coupons);
    if (data.unlocks) setUnlocks(data.unlocks);
    if (data.dailyThreshold) LS.set('dailyThreshold', data.dailyThreshold);
    if (data.dailyThreshold) LS.set('dailyThreshold', data.dailyThreshold);
    if (data.bonusPoints) LS.set('bonus_points', data.bonusPoints);
    return true;
  } catch(e) { return false; }
}

// Override set functions to auto-save
const _setCheckins = setCheckins;
const _setTravelDays = setTravelDays;
const _setLotteryHistory = setLotteryHistory;
const _setCoupons = setCoupons;
const _setUnlocks = setUnlocks;
const _setTasks = setTasks;
const _setBonusPoints = setBonusPoints;

setCheckins = function(v) { _setCheckins(v); scheduleBackup(); };
setTravelDays = function(v) { _setTravelDays(v); scheduleBackup(); };
setLotteryHistory = function(v) { _setLotteryHistory(v); scheduleBackup(); };
setCoupons = function(v) { _setCoupons(v); scheduleBackup(); };
setUnlocks = function(v) { _setUnlocks(v); scheduleBackup(); };
setTasks = function(v) { _setTasks(v); scheduleBackup(); };
setBonusPoints = function(v) { _setBonusPoints(v); scheduleBackup(); };
LS.set = function(k, v) {
  localStorage.setItem(k, JSON.stringify(v));
  if (['tasks','prizes','checkins','travel_days','lottery_history','coupons','unlocks','dailyThreshold','bonus_points'].includes(k)) {
    scheduleBackup();
  }
};

// ===== INIT =====
function startApp() {
openDB().then(() => {
  requestPersistence();

  // Check if fresh start (no tasks in localStorage)
  const hasData = localStorage.getItem('tasks') !== null;
  if (!hasData) {
    // Try to restore from auto-backup

      render();
      showMsg('рҹ”„ е·ІиҮӘеҠЁжҒўеӨҚж•°жҚ®пјҲдёҠж¬Ўдҝқеӯҳпјҡ'+lastSaveTime()+'пјү', 'ok');
    } else {

    }
  } else {
    render();
  }

  // Save on page close
  window.addEventListener('beforeunload', () => {
    scheduleBackup();
    // Force immediate save
    if (backupTimer) { clearTimeout(backupTimer); backupTimer = null; }
    const data = {
      tasks: getTasks(), prizes: getPrizes(), checkins: getCheckins(),
      travelDays: getTravelDays(), lotteryHistory: getLotteryHistory(),
      coupons: getCoupons(), unlocks: getUnlocks(),

      bonusPoints: getBonusPoints(), saved: new Date().toISOString(),
    };
    try { localStorage.setItem('_autobackup', JSON.stringify(data)); } catch(e) {}
  });

  // Periodic full backup every 5 min
  setInterval(() => scheduleBackup(), 300000);
}).catch(err => {
  document.getElementById('app').innerHTML = '<div style="text-align:center;padding:40px"><h2>вқҢ еҲқе§ӢеҢ–еӨұиҙҘ</h2><p>'+err.message+'</p><p>иҜ·е°қиҜ•еҲ·ж–°йЎөйқў</p></div>';
});
} // end startApp
